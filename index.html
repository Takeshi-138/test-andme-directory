<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>And Me</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --coral: #E25C4C;
  --green: #2E9E6E;
  --blue: #2E6FA8;
  --coral-soft: #FAEBE8;
  --green-soft: #E7F5EF;
  --blue-soft: #E7EFF6;
  --text: #1A1A1A;
  --text-muted: #777777;
  --border: #E8E8E8;
  --bg: #FFFFFF;
  --surface: #F8F8F8;
  --radius: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans JP",sans-serif;background:#F0F0F0;color:var(--text);min-height:100vh}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:#F0F0F0}
.login-card{background:#fff;border-radius:14px;padding:3rem 2.5rem;width:100%;max-width:400px;border:1px solid var(--border);text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.login-logo{margin-bottom:1.25rem;display:flex;justify-content:center}
.login-logo img{width:90px;height:90px;object-fit:contain}
.login-card h1{font-size:24px;font-weight:700;margin-bottom:6px;color:var(--text)}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.75rem;line-height:1.7}
.form-label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;text-align:left}
.form-input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:1rem}
.form-input:focus{border-color:var(--green)}
.btn-green{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;cursor:pointer;font-weight:700;transition:opacity .2s}
.btn-green:hover{opacity:.88}
.login-error{font-size:12px;color:var(--coral);margin-top:.75rem;display:none}

/* HEADER */
header{background:#fff;border-bottom:2px solid var(--green);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{width:44px;height:44px;object-fit:contain}
.header-title{font-size:19px;font-weight:700;color:var(--text)}
.header-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.btn-outline-gray{font-size:12px;padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius);background:none;cursor:pointer;color:var(--text-muted);font-family:inherit;transition:border-color .2s,color .2s}
.btn-outline-gray:hover{border-color:var(--green);color:var(--green)}

/* MAIN TABS */
.main-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 2rem;background:#fff;overflow-x:auto}
.main-tab-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);padding:13px 20px;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;font-family:inherit}
.main-tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
.main-panel{display:none;padding:1.75rem 2rem;max-width:1140px;margin:0 auto}
.main-panel.active{display:block}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.1rem;border-top:3px solid var(--green)}
.stat:nth-child(2){border-top-color:var(--coral)}
.stat:nth-child(3){border-top-color:var(--blue)}
.stat:nth-child(4){border-top-color:var(--green)}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.stat-val{font-size:22px;font-weight:700;color:var(--text)}

/* CONTROLS */
.controls{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.controls input,.controls select{padding:9px 13px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:border-color .2s}
.controls input{flex:2;min-width:200px}
.controls select{flex:1;min-width:130px}
.controls input:focus,.controls select:focus{border-color:var(--green)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;cursor:pointer;transition:box-shadow .2s;border-left:4px solid var(--green)}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card:nth-child(3n+2){border-left-color:var(--coral)}
.card:nth-child(3n+3){border-left-color:var(--blue)}
.card-id{font-size:10px;color:var(--text-muted);margin-bottom:5px}
.card-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:2px}
.card-name-kana{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.card-role{font-size:12px;color:var(--text-muted);margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;padding:3px 10px;border-radius:20px}
.tag.industry{background:var(--green-soft);color:var(--green)}
.tag.type{background:var(--coral-soft);color:var(--coral)}
.tag.area{background:var(--blue-soft);color:var(--blue)}
.empty{text-align:center;padding:4rem;color:var(--text-muted);font-size:13px;background:var(--surface);border-radius:var(--radius)}
.loading{text-align:center;padding:4rem;color:var(--text-muted);font-size:13px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:2rem;width:min(500px,100%);max-height:88vh;overflow-y:auto;position:relative;border-top:4px solid var(--green)}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface);border:none;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-muted)}
.modal-id{font-size:10px;color:var(--text-muted);margin-bottom:6px}
.modal-name{font-size:22px;font-weight:700;margin-bottom:2px}
.modal-name-kana{font-size:12px;color:var(--text-muted);margin-bottom:.75rem}
.modal-role{font-size:12px;color:var(--green);font-weight:700;margin-bottom:1.5rem}
.detail-section{margin-bottom:1.25rem}
.detail-section-title{font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);font-weight:700}
.detail-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--text-muted);min-width:110px;flex-shrink:0;font-size:11px;padding-top:1px}
.detail-val{color:var(--text);word-break:break-word;line-height:1.7;white-space:pre-wrap}
.contact-btn{display:inline-flex;align-items:center;gap:7px;margin-top:.5rem;margin-right:.5rem;font-size:11px;padding:8px 16px;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius);text-decoration:none;transition:all .2s}
.contact-btn:hover{border-color:var(--blue);color:var(--blue)}

/* EVENTS */
.event-typetabs{display:flex;gap:8px;margin-bottom:1.25rem}
.event-typetab-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:13px;color:var(--text-muted);padding:8px 22px;border-radius:20px;font-family:inherit;transition:all .2s;font-weight:700}
.event-typetab-btn.offline-active{background:var(--coral);border-color:var(--coral);color:#fff}
.event-typetab-btn.online-active{background:var(--blue);border-color:var(--blue);color:#fff}
.event-typepanel{display:none}
.event-typepanel.active{display:block}
.event-subtabs{display:flex;gap:8px;margin-bottom:1.25rem}
.event-subtab-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:13px;color:var(--text-muted);padding:6px 18px;border-radius:15px;font-family:inherit;transition:all .2s}
.event-subtab-btn.active-offline{border-color:var(--coral);color:var(--coral);font-weight:700}
.event-subtab-btn.active-online{border-color:var(--blue);color:var(--blue);font-weight:700}
.event-subpanel{display:none}
.event-subpanel.active{display:block}
.event-month-label{font-size:17px;font-weight:700;margin-bottom:1.1rem;display:flex;align-items:baseline;gap:5px}
.event-month-label.offline-color{color:var(--coral)}
.event-month-label.online-color{color:var(--blue)}
.event-month-label .num{font-size:24px}
.event-list{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.event-card{background:#fff;padding:1.1rem 1.3rem;display:flex;gap:1.25rem;border-bottom:1px solid var(--border)}
.event-card:last-child{border-bottom:none}
.event-date-block{flex-shrink:0;width:80px;text-align:center;border-right:1px solid var(--border);padding-right:1.1rem}
.event-date-day{font-size:24px;font-weight:700;color:var(--text);line-height:1.1}
.event-date-weekday{font-size:11px;color:var(--text-muted);margin-top:2px}
.event-date-time{font-size:10px;font-weight:700;margin-top:8px}
.event-date-time.offline-color{color:var(--coral)}
.event-date-time.online-color{color:var(--blue)}
.event-info{flex:1;min-width:0}
.event-name-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.event-name{font-size:15px;font-weight:700}
.badge{font-size:10px;padding:3px 10px;border-radius:10px;background:#F0F0F0;color:var(--text-muted)}
.badge.price{background:var(--coral-soft);color:var(--coral)}
.badge.price.online-color{background:var(--blue-soft);color:var(--blue)}
.event-desc{font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:10px}
.event-link{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:7px 16px;color:#fff;border:none;border-radius:var(--radius);text-decoration:none;font-weight:700;transition:opacity .2s}
.event-link:hover{opacity:.85}

/* TERMS */
.terms-box{max-width:500px;margin:2.5rem auto 0;text-align:center}
.terms-box h2{font-size:22px;font-weight:700;margin-bottom:1.5rem}
.terms-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem}
.terms-card p{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;line-height:1.7}
.terms-link-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:var(--green);color:#fff;border-radius:var(--radius);text-decoration:none;font-size:13px;font-weight:700;transition:opacity .2s}
.terms-link-btn:hover{opacity:.85}

@media(max-width:600px){
  header{padding:.9rem 1rem}
  .main-tabs{padding:0 1rem}
  .main-panel{padding:1.25rem 1rem}
  .login-card{padding:2.5rem 1.5rem}
  .stats{grid-template-columns:repeat(2,1fr)}
  .event-card{flex-direction:column;gap:.75rem}
  .event-date-block{width:auto;border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:.75rem;display:flex;align-items:baseline;gap:10px;text-align:left}
  .event-date-time{margin-top:0;margin-left:auto}
}
</style>
</head>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeZXJ0NYnkTTSr_O0Bg1JH_XLdLRKCScwQzeyO1XsgdpYIs4M4QCThi0bD1GTQgz6h5w/exec';
let allData=[], eventsData=null, eventsLoaded=false;

async function login(){
  const pw=document.getElementById('passwordInput').value;
  if(!pw){showLoginError(true);return;}
  const btn=document.querySelector('.login-card .btn-green');
  btn.textContent='確認中…';btn.disabled=true;
  try{
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'checkPassword',password:pw})});
    const data=await res.json();
    if(data.success){
      sessionStorage.setItem('auth','1');
      showLoginError(false);
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('app').style.display='block';
      loadMembers();
    } else { showLoginError(true); }
  }catch(e){showLoginError(true);}
  btn.textContent='入室する';btn.disabled=false;
}
function showLoginError(show){document.getElementById('loginError').style.display=show?'block':'none';}
function logout(){
  sessionStorage.removeItem('auth');
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('passwordInput').value='';
  allData=[];eventsData=null;eventsLoaded=false;
}

const PANELS=['Members','Events','Terms'];
function switchMainTab(which){
  PANELS.forEach(p=>{
    document.getElementById('mainTab'+p)?.classList.toggle('active',p.toLowerCase()===which);
    document.getElementById('panel'+p)?.classList.toggle('active',p.toLowerCase()===which);
  });
  if(which==='events'&&!eventsLoaded)loadEvents();
}

async function loadMembers(){
  try{
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'getMembers'})});
    const data=await res.json();
    if(data.success){
      allData=data.members;
      populateFilters();renderGrid();
      document.getElementById('headerSub').textContent=`${allData.length}名の登録者`;
    }
  }catch(e){document.getElementById('grid').innerHTML='<div class="empty">データの読み込みに失敗しました</div>';}
}

function populateFilters(){
  const industries=new Set(),types=new Set(),areas=new Set();
  allData.forEach(r=>{
    if(r['業界'])industries.add(r['業界']);
    if(r['属性'])types.add(r['属性']);
    if(r['都道府県'])areas.add(r['都道府県']);
  });
  fillSelect('industryFilter',industries,'業界（全て）');
  fillSelect('typeFilter',types,'属性（全て）');
  fillSelect('areaFilter',areas,'都道府県（全て）');
  document.getElementById('totalCount').textContent=allData.length;
  document.getElementById('industryCount').textContent=industries.size;
  document.getElementById('areaCount').textContent=areas.size;
}
function fillSelect(id,set,ph){
  const el=document.getElementById(id);
  el.innerHTML=`<option value="">${ph}</option>`;
  [...set].sort().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});
}
function renderGrid(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const industry=document.getElementById('industryFilter').value;
  const type=document.getElementById('typeFilter').value;
  const area=document.getElementById('areaFilter').value;
  const f=allData.filter(r=>{
    if(industry&&r['業界']!==industry)return false;
    if(type&&r['属性']!==type)return false;
    if(area&&r['都道府県']!==area)return false;
    if(q){const h=((r['氏名（カタカナ）']||'')+(r['業界']||'')+(r['職種']||'')+(r['事業内容']||'')).toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  document.getElementById('showCount').textContent=f.length;
  const grid=document.getElementById('grid');
  if(!f.length){grid.innerHTML='<div class="empty">該当する登録者が見つかりません</div>';return;}
  grid.innerHTML=f.map(r=>{
    const name=r['氏名（カタカナ）']||'名前なし';
    const sub=[r['都道府県'],r['属性'],r['職種']].filter(Boolean).join(' / ');
    const tags=[];
    if(r['業界'])tags.push(`<span class="tag industry">${r['業界']}</span>`);
    if(r['属性'])tags.push(`<span class="tag type">${r['属性']}</span>`);
    if(r['都道府県'])tags.push(`<span class="tag area">${r['都道府県']}</span>`);
    return`<div class="card" onclick="showModal(${allData.indexOf(r)})">
      <div class="card-name">${name}</div>
      <div class="card-role">${sub||'　'}</div>
      ${tags.length?`<div class="tags">${tags.join('')}</div>`:''}
    </div>`;
  }).join('');
}

function showModal(idx){
  const r=allData[idx];
  const name=r['氏名（カタカナ）']||'名前なし';
  let html=`
    <div class="modal-name">${name}</div>
    <div class="modal-role">${[r['属性'],r['職種']].filter(Boolean).join(' / ')||'　'}</div>
    <div class="detail-section">
      <div class="detail-section-title">仕事・事業情報</div>
      ${row('都道府県',r['都道府県'])}${row('業界',r['業界'])}${row('職種',r['職種'])}${row('事業内容',r['事業内容'])}${row('副業内容',r['副業内容'])}${row('繋がりたい人脈',r['繋がりたい人脈'])}
    </div>`;
  const lineLink = r['LINEリンク']||'';
  if(lineLink){html+=`<div class="detail-section"><div class="detail-section-title">連絡先</div><div style="margin-top:.5rem"><a class="contact-btn" href="${lineLink}" target="_blank" rel="noopener">LINE</a></div></div>`;}
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}
function row(label,val){if(!val)return'';return`<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-val">${val}</span></div>`;}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}

async function loadEvents(){
  try{
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'getEvents'})});
    const data=await res.json();
    if(data.success){eventsData=data;eventsLoaded=true;renderEvents();}
    else{document.getElementById('eventsContent').innerHTML='<div class="empty">交流会情報の読み込みに失敗しました</div>';}
  }catch(e){document.getElementById('eventsContent').innerHTML='<div class="empty">交流会情報の読み込みに失敗しました</div>';}
}
function renderEvents(){
  if(!eventsData)return;
  const{offline,online}=eventsData;
  function renderTypePanel(prefix,data,colorClass){
    return`<div class="event-subtabs">
      <button class="event-subtab-btn active-${colorClass}" id="subTab_${prefix}_this" onclick="switchEventSubTab('${prefix}','this','${colorClass}')">${data.thisMonth.month||'-'}月</button>
      <button class="event-subtab-btn" id="subTab_${prefix}_next" onclick="switchEventSubTab('${prefix}','next','${colorClass}')">${data.nextMonth.month||'-'}月</button>
    </div>
    <div class="event-subpanel active" id="subPanel_${prefix}_this">
      <div class="event-month-label ${colorClass}-color"><span class="num">${data.thisMonth.month||'-'}</span><span>月の交流会（${colorClass==='offline'?'オフライン':'オンライン'}）</span></div>
      ${renderEventList(data.thisMonth.events,colorClass)}
    </div>
    <div class="event-subpanel" id="subPanel_${prefix}_next">
      <div class="event-month-label ${colorClass}-color"><span class="num">${data.nextMonth.month||'-'}</span><span>月の交流会（${colorClass==='offline'?'オフライン':'オンライン'}）</span></div>
      ${renderEventList(data.nextMonth.events,colorClass)}
    </div>`;
  }
  document.getElementById('eventsContent').innerHTML=`
    <div class="event-typetabs">
      <button class="event-typetab-btn offline-active" id="typeTabOffline" onclick="switchEventTypeTab('offline')">オフライン</button>
      <button class="event-typetab-btn" id="typeTabOnline" onclick="switchEventTypeTab('online')">オンライン</button>
    </div>
    <div class="event-typepanel active" id="typePanelOffline">${renderTypePanel('offline',offline,'offline')}</div>
    <div class="event-typepanel" id="typePanelOnline">${renderTypePanel('online',online,'online')}</div>`;
}
function renderEventList(events,colorClass){
  if(!events||!events.length)return'<div class="empty">予定されている交流会はありません</div>';
  const linkColor = colorClass==='offline' ? 'var(--coral)' : 'var(--blue)';
  return`<div class="event-list">${events.map(ev=>{
    const dayNum=String(ev['日付']||'').match(/\d+/);
    const cap = ev['定員'] ? `<span class="badge">定員 ${ev['定員']}${String(ev['定員']).includes('名')?'':'名'}</span>` : '';
    const price = ev['参加費'] ? `<span class="badge price ${colorClass==='online'?'online-color':''}">${ev['参加費']}</span>` : '';
    return`<div class="event-card">
      <div class="event-date-block">
        <div class="event-date-day">${dayNum?dayNum[0]:ev['日付']||''}</div>
        <div class="event-date-weekday">${ev['曜日']||''}</div>
        ${ev['開始時間']?`<div class="event-date-time ${colorClass}-color">${ev['開始時間']}${ev['終了時間']?'〜'+ev['終了時間']:''}</div>`:''}
      </div>
      <div class="event-info">
        <div class="event-name-row">
          <div class="event-name">${ev['交流会名']||''}</div>
          ${cap}${price}
        </div>
        ${ev['交流会の説明']?`<div class="event-desc">${ev['交流会の説明']}</div>`:''}
        ${ev['URL']?`<a class="event-link" style="background:${linkColor}" href="${ev['URL']}" target="_blank" rel="noopener">詳細・申し込み</a>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}
function switchEventTypeTab(which){
  document.getElementById('typeTabOffline').classList.toggle('offline-active',which==='offline');
  document.getElementById('typeTabOnline').classList.toggle('online-active',which==='online');
  document.getElementById('typePanelOffline').classList.toggle('active',which==='offline');
  document.getElementById('typePanelOnline').classList.toggle('active',which==='online');
}
function switchEventSubTab(prefix,which,colorClass){
  ['this','next'].forEach(w=>{
    document.getElementById(`subTab_${prefix}_${w}`)?.classList.toggle(`active-${colorClass}`,w===which);
    document.getElementById(`subPanel_${prefix}_${w}`)?.classList.toggle('active',w===which);
  });
}

if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  loadMembers();
}
</script>
</body>
</html>
